name: Deploy

on:
    push:
        branches: [main]

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.0
              with:
                host: ${{secrets.VPS_HOST }}
                username: ${{ secrets.VPS_USER }}
                key: ${{ secrets.VPS_KEY }}
                script: |
                    cd whyle-finance
                    git pull
                    pkill gunicorn || true
                    cd backend
                    pipenv run gunicorn WhyleFinance.wsgi:application --bind 127.0.0.1:8000 --workers 2 --daemon

